<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Don Bosco Theatre - Seat Booking</title>

<script src="https://cdn.tailwindcss.com"></script>

<!-- Firebase SDK Compat (works with firebase.auth() + firestore easily) -->
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>

<style>
    .seat {
        transition: all 0.2s ease;
    }

    .seat:hover:not(.occupied) {
        transform: scale(1.1);
    }

    .available {
        background: #d1d5db;
        cursor: pointer;
    }

    .occupied {
        background: #dc2626;
        cursor: not-allowed;
        color: white;
    }

    .selected {
        background: #3b82f6;
        color: white;
    }
</style>
</head>

<body class="bg-gray-100 p-8">

<div class="max-w-5xl mx-auto">

    <h1 class="text-4xl font-bold text-center mb-6">
        🎭 Don Bosco Theatre
    </h1>

    <!-- AUTH -->
    <div class="bg-white p-6 rounded-lg shadow mb-8">

        <h2 class="text-xl font-bold mb-4">Login / Sign Up</h2>

        <input
            id="auth-email"
            type="email"
            placeholder="Email"
            class="border p-2 rounded w-full mb-3"
        >

        <input
            id="auth-password"
            type="password"
            placeholder="Password"
            class="border p-2 rounded w-full mb-3"
        >

        <div class="flex gap-3 flex-wrap">
            <button id="login-btn" class="bg-blue-600 text-white px-4 py-2 rounded">
                Login
            </button>

            <button id="signup-btn" class="bg-green-600 text-white px-4 py-2 rounded">
                Sign Up
            </button>

            <button id="guest-btn" class="bg-gray-600 text-white px-4 py-2 rounded">
                Continue as Guest
            </button>
        </div>

        <p id="auth-status" class="mt-4 font-semibold"></p>
    </div>

    <!-- SEATS -->
    <div class="bg-white p-6 rounded-lg shadow">

        <h2 class="text-2xl font-bold mb-4">Select Seats</h2>

        <div id="seats-container" class="grid grid-cols-5 gap-3 mb-6"></div>

        <select id="ticket-type" class="border p-2 rounded mb-4">
            <option value="adult">Adult</option>
            <option value="child">Child</option>
        </select>

        <p class="mb-3">
            Total:
            <span id="total" class="font-bold">$0.00</span>
        </p>

        <button
            id="confirm-btn"
            class="bg-purple-600 text-white px-5 py-3 rounded"
        >
            Confirm Booking
        </button>

        <div
            id="confirmation-message"
            class="hidden mt-4 p-3 rounded bg-green-100 text-green-800"
        >
        </div>

    </div>
</div>

<script>
/* =========================
   FIREBASE CONFIG
========================= */

const firebaseConfig = {
    apiKey: "AIzaSyCNkOS9iIm_TTTKSZHfhIcSw94fZUELyRQ",
    authDomain: "don-bosco-theatre-7f7ac.firebaseapp.com",
    projectId: "don-bosco-theatre-7f7ac",
    storageBucket: "don-bosco-theatre-7f7ac.firebasestorage.app",
    messagingSenderId: "980744605039",
    appId: "1:980744605039:web:04f17958f87386f0012c9a",
    measurementId: "G-1LJFSKEQBV"
};

firebase.initializeApp(firebaseConfig);

const db = firebase.firestore();

console.log("🔥 Firestore connected successfully");


/* =========================
   AUTH
========================= */

let currentUser = null;
let isGuest = false;

firebase.auth().onAuthStateChanged((user) => {
    if (user) {
        currentUser = user;
        document.getElementById("auth-status").textContent =
            `👤 ${user.email}`;
    }
});

document.getElementById("login-btn").addEventListener("click", async () => {
    const email = document.getElementById("auth-email").value;
    const password = document.getElementById("auth-password").value;

    try {
        await firebase.auth().signInWithEmailAndPassword(email, password);
        console.log("Login successful");
    } catch (error) {
        alert(error.message);
    }
});

document.getElementById("signup-btn").addEventListener("click", async () => {
    const email = document.getElementById("auth-email").value;
    const password = document.getElementById("auth-password").value;

    try {
        await firebase.auth().createUserWithEmailAndPassword(email, password);
        console.log("Sign up successful");
    } catch (error) {
        alert(error.message);
    }
});

document.getElementById("guest-btn").addEventListener("click", () => {
    isGuest = true;
    document.getElementById("auth-status").textContent =
        "👤 Guest User";
});


/* =========================
   SEATS
========================= */

const selectedSeats = new Set();
const occupiedSeats = new Set([2, 5, 9]);

const prices = {
    adult: 20,
    child: 12
};

function createSeats() {
    const container = document.getElementById("seats-container");

    for (let i = 1; i <= 20; i++) {
        const btn = document.createElement("button");

        btn.textContent = i;
        btn.className = "seat h-12 rounded font-bold";

        if (occupiedSeats.has(i)) {
            btn.classList.add("occupied");
            btn.disabled = true;
        } else {
            btn.classList.add("available");
        }

        btn.addEventListener("click", () => toggleSeat(i, btn));

        container.appendChild(btn);
    }
}

function toggleSeat(seatNumber, button) {
    if (selectedSeats.has(seatNumber)) {
        selectedSeats.delete(seatNumber);
        button.classList.remove("selected");
        button.classList.add("available");
    } else {
        selectedSeats.add(seatNumber);
        button.classList.add("selected");
        button.classList.remove("available");
    }

    updateTotal();
}

function updateTotal() {
    const type = document.getElementById("ticket-type").value;
    const total = selectedSeats.size * prices[type];

    document.getElementById("total").textContent =
        `$${total.toFixed(2)}`;
}

document.getElementById("ticket-type").addEventListener("change", updateTotal);


/* =========================
   CONFIRM BOOKING
========================= */

document.getElementById("confirm-btn").addEventListener("click", confirmBooking);

async function confirmBooking() {
    if (selectedSeats.size === 0) {
        alert("Select at least one seat");
        return;
    }

    const ticketType = document.getElementById("ticket-type").value;

    const bookingData = {
        seats: Array.from(selectedSeats),
        ticketType: ticketType,
        total: parseFloat(
            document.getElementById("total").textContent.replace("$", "")
        ),
        timestamp: new Date().toISOString(),
        userEmail: currentUser
            ? currentUser.email
            : "guest@anonymous.com"
    };

    try {
        const bookingRef = await db.collection("bookings").add(bookingData);

        console.log("✅ Booking saved:", bookingRef.id);

        const msg = document.getElementById("confirmation-message");
        msg.classList.remove("hidden");
        msg.innerHTML =
            `✅ Booking confirmed! Reference: ${bookingRef.id}`;

    } catch (error) {
        console.error(error);
        alert("Booking failed: " + error.message);
    }
}


/* =========================
   START
========================= */

createSeats();
</script>

</body>
</html>
